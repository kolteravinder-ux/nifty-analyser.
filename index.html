<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nifty Analyser - Ravi</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-100 font-sans">
    <div class="max-w-md mx-auto p-6 min-h-screen">
        <header class="mb-8 text-center">
            <h1 class="text-3xl font-black text-sky-400 italic">Nifty Analyser</h1>
            <p class="text-gray-500 text-[10px] mt-1 font-mono uppercase tracking-widest">Quant Research · Ravi</p>
        </header>

        <div class="bg-gray-800 p-6 rounded-3xl shadow-2xl border border-gray-700">
            <label class="block text-[10px] text-sky-500 mb-2 font-bold uppercase tracking-widest ml-1">Session Date</label>
            <input 
                type="date" 
                id="dateInput"
                class="w-full bg-gray-900 border border-gray-600 p-4 rounded-2xl text-white outline-none mb-6"
            />
            <button 
                onclick="runAnalysis()"
                id="runBtn"
                class="w-full bg-sky-500 hover:bg-sky-400 text-gray-900 font-black py-5 rounded-2xl shadow-xl transition-all uppercase tracking-widest"
            >
                Run Analysis
            </button>
        </div>

        <div id="statusBox" class="mt-8 p-6 bg-gray-900 rounded-2xl border border-gray-800 hidden">
            <p id="statusText" class="text-sm text-gray-400 font-mono text-center"></p>
            <div id="liveIndicator" class="mt-4 flex justify-between items-center bg-gray-800 p-3 rounded-xl border border-gray-700 hidden">
                <span class="text-[10px] text-gray-500 font-bold uppercase">Trend Status</span>
                <span class="text-green-400 font-black text-xs">LIVE DATA ACTIVE</span>
            </div>
        </div>
        
        <footer class="mt-10 text-[9px] text-gray-700 text-center uppercase tracking-widest leading-loose">
            <p>Not Financial Advice · High Risk of Capital Loss</p>
        </footer>
    </div>

    <script>
        // Set default date to today
        document.getElementById('dateInput').value = new Date().toISOString().split('T')[0];

        async function runAnalysis() {
            const btn = document.getElementById('runBtn');
            const box = document.getElementById('statusBox');
            const text = document.getElementById('statusText');
            const live = document.getElementById('liveIndicator');
            const date = document.getElementById('dateInput').value;

            btn.disabled = true;
            btn.innerText = "CONNECTING...";
            box.classList.remove('hidden');
            text.innerText = "📡 Connecting to market bridge...";

            try {
                const ticker = "^NSEI"; 
                const apiBase = `https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(ticker)}?interval=5m&range=1d`;
                const proxy = `https://api.allorigins.win/raw?url=${encodeURIComponent(apiBase)}`;
                
                const r = await fetch(proxy);
                const j = await r.json();
                
                if (j?.chart?.result) {
                    text.innerText = "✅ Success! Market session for " + date + " is loading.";
                    live.classList.remove('hidden');
                } else {
                    text.innerText = "❌ No data. Market might be closed.";
                }
            } catch (e) {
                text.innerText = "❌ Bridge busy. Please try again in 10 seconds.";
            } finally {
                btn.disabled = false;
                btn.innerText = "RUN ANALYSIS";
            }
        }
    </script>
</body>
</html>
