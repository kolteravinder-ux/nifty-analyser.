<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nifty Analyser - Ravi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>
</head>
<body class="bg-gray-900 text-gray-100 font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;
        const { LineChart, Line, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer } = Recharts;

        const App = () => {
            const [date, setDate] = useState(new Date().toISOString().split('T')[0]);
            const [loading, setLoading] = useState(false);
            const [chartData, setChartData] = useState(null);

            const startAnalysis = async () => {
                setLoading(true);
                const ticker = "^NSEI"; 
                const [y, m, d] = date.split('-').map(Number);
                const p1 = Math.floor(Date.UTC(y, m - 1, d, 3, 45, 0) / 1000);
                const p2 = Math.floor(Date.UTC(y, m - 1, d, 10, 0, 0) / 1000);
                const apiBase = `https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(ticker)}?interval=5m&period1=${p1}&period2=${p2}`;
                
                try {
                    const r = await fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent(apiBase)}`);
                    const j = await r.json();
                    const result = j.chart.result[0];
                    
                    // Format data for the UI
                    const formatted = result.timestamp.map((t, i) => ({
                        time: new Date(t * 1000).toLocaleTimeString('en-IN', {hour: '2-digit', minute:'2-digit'}),
                        price: result.indicators.quote[0].close[i]
                    }));
                    setChartData(formatted);
                } catch (e) {
                    alert("Bridge busy, try again in 5 seconds.");
                }
                setLoading(false);
            };

            return (
                <div className="max-w-md mx-auto p-4">
                    <header className="mb-6 text-center">
                        <h1 className="text-2xl font-bold text-sky-400">Nifty Analyser</h1>
                        <p className="text-gray-500 text-[10px] font-mono uppercase tracking-widest">Quant Tool · Ravi</p>
                    </header>

                    <div className="bg-gray-800 p-6 rounded-2xl border border-gray-700 mb-6">
                        <input 
                            type="date" 
                            className="w-full bg-gray-900 border border-gray-600 p-3 rounded-xl text-white mb-4"
                            value={date}
                            onChange={(e) => setDate(e.target.value)}
                        />
                        <button 
                            onClick={startAnalysis}
                            className="w-full bg-sky-500 text-gray-900 font-bold py-3 rounded-xl uppercase text-xs tracking-wider"
                        >
                            {loading ? "FETCHING..." : "RUN ANALYSIS"}
                        </button>
                    </div>

                    {chartData && (
                        <div className="bg-gray-800 p-4 rounded-2xl border border-gray-700 animate-in fade-in">
                            <h3 className="text-xs font-bold text-gray-400 mb-4 uppercase tracking-tighter">Intraday Price Action</h3>
                            <ResponsiveContainer width="100%" height={200}>
                                <LineChart data={chartData}>
                                    <CartesianGrid strokeDasharray="3 3" stroke="#374151" />
                                    <XAxis dataKey="time" hide />
                                    <YAxis domain={['auto', 'auto']} tick={{fontSize: 10}} />
                                    <Tooltip contentStyle={{backgroundColor: '#1f2937', border: 'none'}} />
                                    <Line type="monotone" dataKey="price" stroke="#38bdf8" dot={false} strokeWidth={2} />
                                </LineChart>
                            </ResponsiveContainer>
                            
                            <div className="mt-6 grid grid-cols-2 gap-4">
                                <div className="bg-gray-900 p-3 rounded-xl border border-gray-700">
                                    <p className="text-[10px] text-gray-500 uppercase">Current Bias</p>
                                    <p className="text-green-400 font-bold">BULLISH</p>
                                </div>
                                <div className="bg-gray-900 p-3 rounded-xl border border-gray-700">
                                    <p className="text-[10px] text-gray-500 uppercase">Trend Score</p>
                                    <p className="text-sky-400 font-bold">4 / 5</p>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
